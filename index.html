<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IIIT</title>
  <meta name="description" content="IIIT helps Shopify brands grow repeat revenue through retention optimization, subscription analytics, AI automation, and clean revenue reporting." />
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f7f7f5;
      --surface: #ffffff;
      --surface-2: #f3efe7;
      --text: #171717;
      --muted: #6a6a6a;
      --accent: #111111;
      --accent-soft: #e8dfcf;
      --line: #e7e1d8;
      --shadow: 0 18px 44px rgba(17, 17, 17, 0.08);
      --radius: 22px;
      --max: 1220px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    .container {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7a6f61;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      padding: 0 28px;
      border-radius: 14px;
      border: 1px solid transparent;
      font-size: 1rem;
      font-weight: 700;
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(0,0,0,0.08);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--line);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(23,23,23,0.06);
    }

    .nav {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      color: #262626;
      font-weight: 600;
    }

    .nav-links a:hover { opacity: 0.65; }

    .menu-btn {
      display: none;
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(rgba(255,255,255,0.56), rgba(255,255,255,0.76)),
        url('dashboard hero.jpg') center/cover no-repeat;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 15%, rgba(255,255,255,0.45), transparent 36%);
